<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Conversation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #FFFFFF;
      padding: 14px 12px 16px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-text-size-adjust: 100%;
    }
    .conv-container { display: flex; flex-direction: column; gap: 18px; }
    .conv-section {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 3px solid transparent;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .conv-section.active.you-turn {
      animation: border-flash-you 1.2s ease-in-out infinite;
    }
    @keyframes border-flash-you {
      0%, 100% { border-color: #0d6efd; box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.4); }
      50% { border-color: #0d6efd; box-shadow: 0 0 12px 4px rgba(13, 110, 253, 0.35); }
    }
    .conv-section.active.app-turn {
      animation: border-flash-app 1.2s ease-in-out infinite;
    }
    @keyframes border-flash-app {
      0%, 100% { border-color: #198754; box-shadow: 0 0 0 0 rgba(25, 135, 84, 0.4); }
      50% { border-color: #198754; box-shadow: 0 0 12px 4px rgba(25, 135, 84, 0.35); }
    }
    .conv-label {
      font-size: clamp(13px, 3.2vw, 15px);
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 10px 14px;
      color: #FFFFFF;
      line-height: 1.3;
    }
    .conv-label-you {
      background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%);
    }
    .conv-label-app {
      background: linear-gradient(135deg, #2E7D32 0%, #1B5E20 100%);
    }
    .conv-content {
      font-size: clamp(16px, 4vw, 20px);
      line-height: 1.5;
      padding: 14px 16px 16px;
      min-height: 44px;
      word-wrap: break-word;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    .conv-content-p1 {
      background: #E3F2FD;
      color: #0D47A1;
      border-left: 4px solid #1565C0;
    }
    .conv-content-p2 {
      background: #E8F5E9;
      color: #1B5E20;
      border-left: 4px solid #2E7D32;
    }
    .conv-bengali {
      display: block;
      margin-top: 6px;
      font-size: 0.9em;
      opacity: 0.9;
    }
    .conv-content-empty { color: #9E9E9E; font-style: italic; }
  </style>
</head>
<body>
  <div class="conv-container" id="conv_container">
    <!-- Section 1 = P1 (always top). Section 2 = P2 (always bottom). Only labels YOU/APP change. -->
    <div class="conv-section" id="section_p1">
      <div class="conv-label conv-label-you" id="label_p1">P1</div>
      <div class="conv-content conv-content-p1" id="content_p1"></div>
    </div>
    <div class="conv-section" id="section_p2">
      <div class="conv-label conv-label-app" id="label_p2">P2</div>
      <div class="conv-content conv-content-p2" id="content_p2"></div>
    </div>
  </div>
  <script>
    function setLabel1(name) {
      var el = document.getElementById('label_p1');
      if (el) { el.textContent = name || 'P1'; el.className = 'conv-label ' + (name === 'APP' ? 'conv-label-app' : 'conv-label-you'); }
    }
    function setLabel2(name) {
      var el = document.getElementById('label_p2');
      if (el) { el.textContent = name || 'P2'; el.className = 'conv-label ' + (name === 'APP' ? 'conv-label-app' : 'conv-label-you'); }
    }
    function setContent1(html) {
      var el = document.getElementById('content_p1');
      if (el) { el.innerHTML = html || ''; el.classList.toggle('conv-content-empty', !html); }
    }
    function setContent2(html) {
      var el = document.getElementById('content_p2');
      if (el) { el.innerHTML = html || ''; el.classList.toggle('conv-content-empty', !html); }
    }
    function setActiveSection(sectionNum, isAppTurn) {
      var s1 = document.getElementById('section_p1');
      var s2 = document.getElementById('section_p2');
      if (s1) { s1.classList.remove('active', 'you-turn', 'app-turn'); if (sectionNum === 1) s1.classList.add('active', isAppTurn ? 'app-turn' : 'you-turn'); }
      if (s2) { s2.classList.remove('active', 'you-turn', 'app-turn'); if (sectionNum === 2) s2.classList.add('active', isAppTurn ? 'app-turn' : 'you-turn'); }
    }
    function setActiveNone() {
      var s1 = document.getElementById('section_p1');
      var s2 = document.getElementById('section_p2');
      if (s1) s1.classList.remove('active', 'you-turn', 'app-turn');
      if (s2) s2.classList.remove('active', 'you-turn', 'app-turn');
    }
  </script>
</body>
</html>
