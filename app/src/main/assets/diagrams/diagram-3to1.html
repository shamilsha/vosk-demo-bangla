<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verb 'Have' – 3 to 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #fff;
      padding: 12px;
      min-height: 100vh;
    }
    .title-bar {
      background: #1565C0;
      color: #fff;

      padding: 8px 16px;
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 16px;
      border-radius: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      min-height: 56px;
    }
    .subjects {
      flex: 1;
      max-width: 140px;
      background: #fff;
      border: 2px solid #90CAF9;
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    .arrow-wrap {
      flex-shrink: 0;
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-wrap svg {
      width: 40px;
      height: 24px;
    }
    .verb-circle {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 2px solid #BDBDBD;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="title-bar">The verb &ldquo;to have&rdquo;</div>
  <div class="row">
    <div class="subjects">

    </div>
    <div class="arrow-wrap">
      <svg viewBox="0 0 40 24"><line x1="0" y1="12" x2="32" y2="12" stroke="#333" stroke-width="2"/><polygon points="32,8 40,12 32,16" fill="#333"/></svg>
    </div>
    <div class="verb-circle">have</div>
  </div>
  <div class="row">
    <div class="subjects">

    </div>
    <div class="arrow-wrap">
      <svg viewBox="0 0 40 24"><line x1="0" y1="12" x2="32" y2="12" stroke="#333" stroke-width="2"/><polygon points="32,8 40,12 32,16" fill="#333"/></svg>
    </div>

  </div>
  <div class="row">
    <div class="subjects">
      <span>We</span>
      <span>They</span>
    </div>
    <div class="arrow-wrap">
      <svg viewBox="0 0 40 24"><line x1="0" y1="12" x2="32" y2="12" stroke="#333" stroke-width="2"/><polygon points="32,8 40,12 32,16" fill="#333"/></svg>
    </div>
    <div class="verb-circle">have</div>
  </div>
